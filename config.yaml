blueprints:
  pkgit:
    repo: "https://git.symlinx.net/pkgit"
    steps:
      - "make"
    artifacts:
      - "pkgit"
  wares-git:
    repo: "https://github.com/indium114/wares"
    steps:
      - "nix develop --command go build"
      - "mv ./wares ./wares-git"
    artifacts:
      - "wares-git"
  termfarm:
    repo: "https://github.com/indium114/termfarm"
    steps:
      - "swift package reset"
      - "swift build --configuration release"
    artifacts:
      - ".build/release/termfarm"

