settings:
  managers:
    brew:
      install: "brew install"
      remove: "brew remove"
      update: "brew upgrade"
    deb:
      install: "sudo nala install -y"
      remove: "sudo nala remove -y"
      update: "sudo nala update; sudo nala upgrade -y"
    flatpak:
      install: "flatpak install -y flathub"
      remove: "flatpak remove -y"
      update: "flatpak update -y"
    go:
      install: "go install"
      remove: "echo ''"

wares:
  wares:
    name: wares
    repo: indium114/wares
    asset: "wares_Linux_x86_64"
  hx:
    name: hx
    repo: helix-editor/helix
    asset: "*.AppImage"
  lazygit:
    name: lazygit
    repo: jesseduffield/lazygit
    asset: "lazygit_*_linux_x86_64.tar.gz"
  gh:
    name: bin/gh
    repo: cli/cli
